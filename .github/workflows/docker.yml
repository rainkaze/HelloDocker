name: Docker CI/CD

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: docker-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE_NAME: hellodocker-backend
  FRONTEND_IMAGE_NAME: hellodocker-frontend

jobs:
  test:
    name: Build and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare environment
        run: cp .env.example .env

      - name: Build and start services
        run: docker compose -f compose.yaml up --build -d

      - name: Check backend health
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8000/api/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f compose.yaml logs
          exit 1

      - name: Check frontend
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8080; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f compose.yaml logs
          exit 1

      - name: Stop services
        if: always()
        run: docker compose -f compose.yaml down -v

  publish:
    name: Publish Docker images
    needs: test
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Docker Hub namespace
        run: |
          if [ -z "$DOCKERHUB_NAMESPACE" ]; then
            echo "Set DOCKERHUB_USERNAME as a GitHub Actions variable or secret."
            exit 1
          fi

      - name: Verify Docker Hub token
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Set DOCKERHUB_TOKEN as a GitHub Actions secret."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract backend metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Extract frontend metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
