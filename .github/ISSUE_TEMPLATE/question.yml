name: 问题咨询
description: 询问项目使用、配置或流程问题。
title: "❓ question: "
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: 问题
      description: 你想了解或确认什么？
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 上下文
      description: 你已经尝试了什么？可以附上命令、报错信息或相关链接。
