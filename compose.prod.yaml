services:
  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE, for example yourname/hellodocker-backend:0.1.0}
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    image: ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE, for example yourname/hellodocker-frontend:0.1.0}
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
